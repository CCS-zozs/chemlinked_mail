<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webinar 邀请函生成器 - ChemLinked Japan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="app" class="max-w-7xl mx-auto flex gap-8">
        
        <div class="w-[45%] bg-white p-6 rounded-lg shadow-md h-[85vh] overflow-y-auto">
            <div class="flex items-center gap-2 mb-6 border-b pb-4">
                <span class="text-3xl">🎟️</span>
                <h2 class="text-2xl font-bold text-gray-800">Webinar 邀请函编辑</h2>
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 mb-1">1. 前言 (引言与背景)</label>
                <textarea v-model="mailData.preface" rows="4" class="block w-full border border-gray-300 rounded-md p-2 text-sm" placeholder="例如：2026年5月1日より..."></textarea>
                <span class="text-xs text-gray-400">支持直接使用基础的 HTML 标签，如 &lt;strong&gt; 或 &lt;a&gt;</span>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 mb-1">2. 标题</label>
                <input v-model="mailData.title" type="text" class="block w-full border border-gray-300 rounded-md p-2 text-sm">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 mb-1">3. 图片 (URL)</label>
                <input v-model="mailData.imgUrl" type="text" class="block w-full border border-gray-300 rounded-md p-2 text-sm" placeholder="https://resource.chemlinked.com.cn/apeaced/webinar-banner-260416-jp-c.png">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 mb-1">4. 该 Webinar 的简介</label>
                <textarea v-model="mailData.webinarDesc" rows="4" class="block w-full border border-gray-300 rounded-md p-2 text-sm" placeholder="简述 Webinar 的核心目的或看点..."></textarea>
            </div>

            <div class="mb-5 bg-gray-50 p-4 rounded-md border border-gray-200">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-bold text-gray-700">5. 講演内容（予定）</label>
                    <button @click="addAgenda" class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600">+ 添加内容</button>
                </div>
                <div v-for="(item, index) in mailData.agendaList" :key="'agenda-'+index" class="flex gap-2 mb-2 items-center">
                    <span class="text-gray-500 text-sm w-4">{{ index + 1 }}.</span>
                    <input v-model="mailData.agendaList[index]" type="text" class="flex-1 border border-gray-300 rounded-md p-1.5 text-sm">
                    <button @click="removeAgenda(index)" class="text-red-500 text-xs font-bold hover:underline">删除</button>
                </div>
            </div>

            <div class="mb-5 bg-gray-50 p-4 rounded-md border border-gray-200">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-bold text-gray-700">6. 開催日程</label>
                    <button @click="addSchedule" class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600">+ 添加日程</button>
                </div>
                <div v-for="(item, index) in mailData.scheduleList" :key="'schedule-'+index" class="flex gap-2 mb-2 items-center">
                    <span class="text-gray-500 text-sm w-4">-</span>
                    <input v-model="mailData.scheduleList[index]" type="text" class="flex-1 border border-gray-300 rounded-md p-1.5 text-sm">
                    <button @click="removeSchedule(index)" class="text-red-500 text-xs font-bold hover:underline">删除</button>
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 mb-1">7. 备注</label>
                <textarea v-model="mailData.note" rows="3" class="block w-full border border-gray-300 rounded-md p-2 text-sm"></textarea>
            </div>

            <div class="mb-5 border-t pt-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">8. 报名按钮</label>
                <div class="flex gap-2 mb-2">
                    <input v-model="mailData.btnText" type="text" class="w-1/3 border border-gray-300 rounded-md p-2 text-sm" placeholder="按钮文字">
                    <input v-model="mailData.btnLink" type="text" class="flex-1 border border-gray-300 rounded-md p-2 text-sm" placeholder="跳转超链接 (URL)">
                </div>
            </div>
            
        </div>

        <div class="w-[55%] flex flex-col gap-4 h-[85vh]">
            <div class="bg-white p-4 rounded-lg shadow-md flex justify-between items-center">
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button @click="viewMode = 'preview'" 
                            :class="viewMode === 'preview' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'" 
                            class="px-4 py-2 rounded-md font-bold text-sm transition-all duration-200">
                        👀 实时预览
                    </button>
                    <button @click="viewMode = 'code'" 
                            :class="viewMode === 'code' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'" 
                            class="px-4 py-2 rounded-md font-bold text-sm transition-all duration-200">
                        💻 HTML 源码
                    </button>
                </div>
                <button @click="copyHtml" class="bg-green-600 text-white px-5 py-2 rounded-md font-bold text-sm hover:bg-green-700 transition shadow-sm">
                    {{ copyBtnText }}
                </button>
            </div>
            
            <div class="bg-gray-800 rounded-lg shadow-md p-1 flex-1 overflow-hidden relative border border-gray-300">
                <iframe v-if="viewMode === 'preview'" 
                        :srcdoc="generatedHtml" 
                        class="w-full h-full bg-white rounded bg-[url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAOklEQVQYV2NkYGAwYkAD////Z4QxMARgEhkYGKEYxIEmD1YJ0whSCTYJViVIlWCVyJEgV4JUYhEJCgC/wA8x08T3LQAAAABJRU5ErkJggg==')]">
                </iframe>
                <textarea v-else readonly class="w-full h-full bg-[#1e1e1e] text-[#d4d4d4] font-mono text-sm p-4 rounded border-none outline-none resize-none leading-relaxed">{{ generatedHtml }}</textarea>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, reactive, computed } = Vue

        createApp({
            setup() {
                const viewMode = ref('preview')
                const copyBtnText = ref('📋 复制 HTML')
                
                // 数据初始化（基于你提供的邮件源码）
                const mailData = reactive({
                    preface: '2026年5月1日より、<a href="https://jp.chemlinked.com/" target="_blank" style="color: #991B4A;font-weight: bold;text-decoration: none;">「中華人民共和国危険化学品安全法」</a>が正式に施行されます。これは、中国の危険化学品安全管理が行政法規（条例）レベルから国家法律レベルへと正式に格上げされることを意味し、法的効力および監督管理の強度の双方において質的な飛躍を実現するものです。',
                    title: '無料ウェブナー',
                    imgUrl: 'https://mcusercontent.com/90f812c8598491dbd61143d91/images/811ccc99-2a8e-8154-ecec-0ec43ab23b77.png',
                    webinarDesc: 'このたび、ChemLinked Japanは主要なポイントと関連規制の最新動向を解説するウェビナーをご用意しており、皆様が円滑に市場への展開を進める一助となれば幸いです。',
                    agendaList: [
                        '背景',
                        '法律の枠組みと主要なポイント',
                        '関連規制の最新動向'
                    ],
                    scheduleList: [
                        '日付：<span style="color:#B22222"><strong>2026年4月16日（木）</strong></span>',
                        '時間（GMT+9）：15:00-16:00（日本時間）',
                        '言語：日本語'
                    ],
                    note: 'ご注意：本ウェブセミナーは無料でご参加いただけますが、開催後の資料ダウンロードおよびオンデマンド視聴につきましては、単品購入の場合を除き、本サイトの<span style="color:#FF0000"><strong>スタンダード会員以上の方</strong></span>に限定させていただきます。あらかじめご了承くださいますようお願い申し上げます。',
                    btnText: 'お申し込みはこちら',
                    btnLink: 'https://jp.chemlinked.com/new-webinar/delve-into-chinas-hazardous-chemials-safety-law'
                })

                // 数组操作逻辑
                const addAgenda = () => mailData.agendaList.push('')
                const removeAgenda = (index) => mailData.agendaList.splice(index, 1)
                const addSchedule = () => mailData.scheduleList.push('')
                const removeSchedule = (index) => mailData.scheduleList.splice(index, 1)

                // 文本换行处理辅助函数
                const formatText = (text) => {
                    if (!text) return '';
                    return text.replace(/\n/g, '<br>');
                }

                // 生成核心 HTML
                const generatedHtml = computed(() => {
                    
                    const agendaHtml = mailData.agendaList.map(item => `
                                    <li style="text-align: left; margin-bottom: 5px; mso-line-height-rule: exactly; -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%;">
                                        <span style="font-size:15px">${item}</span>
                                    </li>`).join('');

                    const scheduleHtml = mailData.scheduleList.map(item => `
                                    <li style="text-align: left; margin-bottom: 5px; mso-line-height-rule: exactly; -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%;">
                                        <span style="font-size:15px">${item}</span>
                                    </li>`).join('');

                    return `<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>ChemLinked Japan Webinar</title>
</head>
<body style="background-color: #DDDDDD; margin: 0; padding: 0;">
    <center>
        <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #DDDDDD; margin: 0; padding: 0; width: 100%;">
            <tr>
                <td align="center" valign="top" style="padding-top: 20px; padding-bottom: 20px;">
                    
                    <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #FFFFFF; width: 600px; max-width: 600px; border: 1px solid #D5D5D5;">
                        <tr>
                            <td align="left" valign="top" style="padding: 18px; text-align: left; font-family: Verdana, sans-serif; color: #202020; font-size: 14px; line-height: 150%;">
                                
                                <div style="text-align: center; margin-bottom: 18px;">
                                    <span style="font-size:15px">★ ChemLinked Japanメールマガジン ★<br>https://jp.chemlinked.com/</span>
                                </div>
                                <div style="border-top: 2px dashed #222222; margin: 18px 0;"></div>

                                <div style="text-align: justify; margin-bottom: 18px;">
                                    <span style="font-size:15px">${formatText(mailData.preface)}</span>
                                </div>
                                <div style="border-top: 2px solid #EAEAEA; margin: 18px 0;"></div>

                                <div style="text-align: left; margin-bottom: 18px;">
                                    <span style="color:#699d67"><span style="font-size:20px"><strong>${mailData.title}</strong></span></span>
                                </div>

                                <div style="text-align: center; margin-bottom: 18px;">
                                    <a href="${mailData.btnLink}" target="_blank">
                                        <img alt="${mailData.title}" src="${mailData.imgUrl}" width="553" style="max-width: 100%; display: inline-block; border: 0; height: auto;" />
                                    </a>
                                </div>

                                ${mailData.webinarDesc ? `
                                <div style="text-align: justify; margin-bottom: 18px;">
                                    <span style="font-size:15px">${formatText(mailData.webinarDesc)}</span>
                                </div>
                                ` : ''}

                                <div style="text-align: left; margin-bottom: 10px;">
                                    <span style="font-size:18px"><strong>講演内容（予定）</strong></span>
                                </div>
                                <ol style="margin: 0 0 18px 0; padding: 0 0 0 25px; text-align: left;">
                                    ${agendaHtml}
                                </ol>

                                <div style="text-align: left; margin-bottom: 10px;">
                                    <span style="font-size:18px"><strong>開催日程</strong></span>
                                </div>
                                <ol style="margin: 0 0 18px 0; padding: 0 0 0 25px; text-align: left;">
                                    ${scheduleHtml}
                                </ol>

                                <div style="text-align: justify; margin-bottom: 25px;">
                                    ${formatText(mailData.note)}
                                </div>

                                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 20px;">
                                    <tr>
                                        <td align="center">
                                            <table border="0" cellpadding="0" cellspacing="0" style="background-color: #4CAAD8;">
                                                <tr>
                                                    <td align="center" valign="middle" style="padding: 15px 30px;">
                                                        <a href="${mailData.btnLink}" target="_blank" style="font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; color: #FFFFFF; text-decoration: none; display: block;">${mailData.btnText}</a>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                </table>
                                <div style="border-top: 2px solid #EAEAEA; margin: 25px 0;"></div>

                                <div style="text-align: center; margin-bottom: 15px;">
                                    <h2 style="font-family: Verdana, sans-serif; font-size: 20px; font-weight: bold; color: #991B4A; margin: 0;">◎ChemLinked Japan活用のメリット◎</h2>
                                </div>
                                <div style="text-align: justify; margin-bottom: 25px; font-size: 14px; line-height: 150%;">
                                    --------------------------------------------------------------------------<br>
                                    ■ 現地の化学品、EHS、食品接触材料法規制最新情報をお届け！<br>
                                    ■ 電子版データ、Webセミナー、レポートなどで法規制対応を支援！<br>
                                    --------------------------------------------------------------------------<br>
                                    中国を含むアジア太平洋地域において、化学品や食品接触材料、EHSで長年の法規制対応の経験を持つコンサルティング会社REACH24Hが運営する情報収集ツールです。<br><br>
                                    会員区分及び利用規約は<a href="https://jp.chemlinked.com/membership" target="_blank" style="color: #991B4A; font-weight: bold; text-decoration: none;">こちら</a>
                                </div>

                                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 30px;">
                                    <tr>
                                        <td align="center">
                                            <table border="0" cellpadding="0" cellspacing="0" style="background-color: #4CAAD8;">
                                                <tr>
                                                    <td align="center" valign="middle" style="padding: 15px 30px;">
                                                        <a href="https://jp.chemlinked.com/freetrial" target="_blank" style="font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; color: #FFFFFF; text-decoration: none; display: block;">14日間無料体験をお申込みこちら</a>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                </table>

                                <div style="text-align: center; border-top: 1px dashed #cccccc; padding-top: 20px;">
                                    <a href="*|UNSUB|*" style="color: #666666; font-size: 12px; text-decoration: underline;">メール配信停止（Unsubscribe）</a>
                                </div>

                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>`;
                })

                const copyHtml = async () => {
                    try {
                        await navigator.clipboard.writeText(generatedHtml.value)
                        copyBtnText.value = '🎉 复制成功'
                        setTimeout(() => { copyBtnText.value = '📋 复制 HTML' }, 2000)
                    } catch (err) {
                        alert('复制失败，请切换到源码视图全选复制')
                    }
                }

                return {
                    viewMode,
                    mailData,
                    addAgenda,
                    removeAgenda,
                    addSchedule,
                    removeSchedule,
                    generatedHtml,
                    copyHtml,
                    copyBtnText
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
